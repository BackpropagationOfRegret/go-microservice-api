services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: food
      POSTGRES_PASSWORD: food
      POSTGRES_DB: food_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./deploy/kafka-init.sh:/kafka-init.sh:ro
    entrypoint: ["/bin/sh", "/kafka-init.sh"]
    restart: "no"

  user-svc:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    environment:
      DATABASE_URL: postgres://food:food@postgres:5432/user_db?sslmode=disable
      JWT_SECRET: dev-secret-change-me
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  restaurant-svc:
    build:
      context: .
      dockerfile: services/restaurant/Dockerfile
    environment:
      DATABASE_URL: postgres://food:food@postgres:5432/restaurant_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"

  order-svc:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    environment:
      DATABASE_URL: postgres://food:food@postgres:5432/order_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      USER_SVC_URL: http://user-svc:8081
      RESTAURANT_SVC_URL: http://restaurant-svc:8082
      PORT: "8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      user-svc:
        condition: service_started
      restaurant-svc:
        condition: service_started
    ports:
      - "8083:8083"

  payment-svc:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://food:food@postgres:5432/payment_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      PAYMENT_FAIL_RATE: "0.0"
      PORT: "8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8084:8084"

  delivery-svc:
    build:
      context: .
      dockerfile: services/delivery/Dockerfile
    environment:
      DATABASE_URL: postgres://food:food@postgres:5432/delivery_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      ORDER_SVC_URL: http://order-svc:8083
      PORT: "8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      order-svc:
        condition: service_started
    ports:
      - "8085:8085"

  notification-svc:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      PORT: "8086"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8086:8086"

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      JWT_SECRET: dev-secret-change-me
      USER_SVC_URL: http://user-svc:8081
      RESTAURANT_SVC_URL: http://restaurant-svc:8082
      ORDER_SVC_URL: http://order-svc:8083
      PAYMENT_SVC_URL: http://payment-svc:8084
      DELIVERY_SVC_URL: http://delivery-svc:8085
      PORT: "8080"
    depends_on:
      - user-svc
      - restaurant-svc
      - order-svc
      - payment-svc
      - delivery-svc
    ports:
      - "8090:8080"

  traefik:
    image: traefik:v3.1
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      - gateway

volumes:
  postgres_data:
